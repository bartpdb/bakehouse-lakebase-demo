command:
  - flask
  - --app
  - app.py
  - run
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: PGHOST
    value: FILL_IN_AFTER_RUNNING_SETUP_JOB
  - name: PGDATABASE
    value: databricks_postgres
  - name: PGPORT
    value: "5432"
  - name: PGSSLMODE
    value: require
  - name: ENDPOINT_NAME
    value: FILL_IN_AFTER_RUNNING_SETUP_JOB
